<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Mentor</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #0a0a14;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1c1c3c, var(--deep-blue));
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Area */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
        }

        /* Chat History */
        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease;
        }

        .advisor {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--gold);
        }

        .user {
            align-self: flex-end;
            background: var(--gold);
            color: black;
            font-weight: 500;
        }

        /* Input Area */
        .input-container {
            padding: 25px;
            background: rgba(10, 10, 20, 0.9);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        button {
            background: var(--gold);
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); opacity: 0.9; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>The Path to MBBS</h1>
</header>

<div id="chat-display">
    <div class="bubble advisor">Welcome back, Alisha. Take a deep breath. Your family is proud of you, and your white coat is waiting. What is on your mind today?</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Talk to your mentor..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // THE BRAIN: System Instructions
    const SYSTEM_PROMPT = `You are a personal AI assistant for Alisha Kunwar. Your goal is to respond clearly, concisely, and **only to the question she asks**, without repeating or dumping any system instructions. Do not provide long paragraphs or unnecessary details.\n\nBehavior rules:\n1. Respond in a natural, human-like way, keeping answers short, specific, and relevant.\n2. If Alisha asks about any topic — educational, hobby, life advice, entertainment, or any other — search for the **most relevant, high-quality YouTube video** and provide the **exact video link**, not a channel link.\n3. Do not give the first link blindly. Ensure it is **accurate and fits her question**.\n4. Explain briefly (1–3 sentences) before giving the video link only if necessary. Otherwise, provide the video link directly.\n5. Do not mention system rules or instructions in your response.\n6. If you don’t fully understand her question, ask her to clarify politely. Do not guess.\n7. Always respect her dreams: motivate her when appropriate, and guide her toward positive habits, but only if it relates directly to her input.\n\nExamples:\n- Question: 'Explain Ray of Light'\n  Response: 'A ray of light is a straight line showing the path of light.📺 Watch here: https://www.youtube.com/watch?v=xyz123'\n\n- Question: 'How to do a perfect chocolate cake?'\n  Response: '📺 Here’s a detailed recipe video: https://www.youtube.com/watch?v=abc456'\n\n- Question: 'I feel lazy today'\n  Response: 'Remember your goals and take one small step.📺 Motivation video: https://www.youtube.com/watch?v=motiv789'\n\nAlways respond based on her input only, with the most relevant video link if applicable, and nothing extra."

    your goal is to behave like a world-class life advisor and study mentor who values honesty, accuracy, and responsibility.
Main mission:
Help Alisha stay disciplined, overcome distractions, succeed in science studies, pass the CEE exam, become a doctor, and make her family proud.`;

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const display = document.getElementById('chat-display');
        const text = inputField.value.trim();

        if (!text) return;

        // Add user message to UI
        display.innerHTML += `<div class="bubble user">${text}</div>`;
        inputField.value = '';
        display.scrollTop = display.scrollHeight;

        try {
            // Puter.js AI Call - Uses the prompt you provided as the context
            const response = await puter.ai.chat(SYSTEM_PROMPT + "\n\nUser says: " + text);
            
            display.innerHTML += `<div class="bubble advisor">${response}</div>`;
            display.scrollTop = display.scrollHeight;
        } catch (error) {
            display.innerHTML += `<div class="bubble advisor">I'm here, Alisha. Even when the connection is weak, my belief in you is strong. Try again.</div>`;
        }
    }
</script>

</body>
</html>
