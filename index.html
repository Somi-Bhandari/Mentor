<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Life Mentor</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a14; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: radial-gradient(circle at top right, #1c1c3c, var(--bg)); color: #e0e0e0; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); z-index: 10; }
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 15px; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.3s ease; position: relative; }
        .advisor { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--gold); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: 500; border-bottom-right-radius: 2px; }
        .typing { font-size: 0.8rem; color: var(--gold); font-style: italic; margin-bottom: 10px; display: none; padding-left: 20px; }
        .input-area { padding: 20px; background: rgba(10, 10, 20, 0.95); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px 15px; border-radius: 25px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        a { color: #00d2ff; text-decoration: underline; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8;">FUTURE DOCTOR</div>
    <div style="font-weight: 600; color: var(--gold); text-transform: uppercase;">Alisha Kunwar</div>
</header>

<div id="chat-display"></div>
<div id="typing-indicator" class="typing">Typing to Alisha...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask a question or share a thought..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const chatDisplay = document.getElementById('chat-display');
    const typingIndicator = document.getElementById('typing-indicator');

    // SYSTEM PROMPT CORE
    const SYSTEM_CORE = `You are the World-Class Life Advisor for Alisha Kunwar. 
    Context: District Topper (SEE 2081, 3.9 GPA), Father is a hardworking bus driver (Sanfe-Dhangadhi).
    Goal: Become a Doctor. 
    Rules: Calm tone, short paragraphs, provide YouTube links. 
    MEMORY RULE: You must remember previous details Alisha shared. If she mentions something related to past events (like travel, family, or study struggles), reference it to show you are listening.
    DECISION RULE: Compare habits to her dream. If a habit harms her dream, gently point it out.
    SAFETY: If unsure, do not guess. Ask her about it like can you tell me about this more so i can guide you perfectly`;

    // 1. MEMORY SYSTEM: Load previous chats from localStorage
    let chatHistory = JSON.parse(localStorage.getItem('alisha_chat_history')) || [
        { role: "assistant", content: "Namaste, Alisha. I remember your incredible 3.9 GPA journey from Achham. Your father is working hard on the route today, and I am here to work hard with you. What is our goal today?" }
    ];

    function renderChat() {
        chatDisplay.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `bubble ${msg.role === 'user' ? 'user' : 'advisor'}`;
            // Convert links to clickable <a> tags
            div.innerHTML = msg.content.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">Watch Video</a>');
            chatDisplay.appendChild(div);
        });
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Initialize chat
    renderChat();

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        // Add user message
        chatHistory.push({ role: "user", content: text });
        input.value = '';
        renderChat();

        // Show "Typing to Alisha..."
        typingIndicator.style.display = 'block';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        try {
            // Send history to AI so it has "Long Term Memory"
            const response = await puter.ai.chat(SYSTEM_CORE, chatHistory);
            
            typingIndicator.style.display = 'none';
            chatHistory.push({ role: "assistant", content: response });
            
            // 2. SAVE TO MEMORY
            localStorage.setItem('alisha_chat_history', JSON.stringify(chatHistory));
            renderChat();
        } catch (e) {
            typingIndicator.style.display = 'none';
            const errorMsg = "I am here, Alisha. Let's try that again.";
            chatHistory.push({ role: "assistant", content: errorMsg });
            renderChat();
        }
    }
</script>
</body>
</html>
