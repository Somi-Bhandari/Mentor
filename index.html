<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Life Mentor</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a14; --glass: rgba(255, 255, 255, 0.05); }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at top right, #1c1c3c, var(--bg)); 
            color: #e0e0e0; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            padding: 15px; 
            text-align: center; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            backdrop-filter: blur(10px); 
            flex-shrink: 0;
        }

        /* Chat display fixed height to prevent pushing input off screen */
        #chat-display { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }

        .bubble { 
            max-width: 85%; 
            padding: 12px 18px; 
            border-radius: 15px; 
            line-height: 1.6; 
            font-size: 0.95rem; 
            animation: fadeIn 0.3s ease; 
        }

        .advisor { 
            align-self: flex-start; 
            background: var(--glass); 
            border-left: 3px solid var(--gold); 
        }

        .user { 
            align-self: flex-end; 
            background: var(--gold); 
            color: black; 
            font-weight: 500; 
        }

        .typing { 
            font-size: 0.8rem; 
            color: var(--gold); 
            padding: 10px 20px; 
            display: none; 
            font-style: italic;
        }

        /* Moved Input Area Up with Padding */
        .input-area { 
            padding: 20px 20px 40px 20px; /* Extra bottom padding for mobile safety */
            background: rgba(10, 10, 20, 0.95); 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        input { 
            flex: 1; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 12px 15px; 
            border-radius: 25px; 
            color: white; 
            outline: none; 
        }

        button { 
            background: var(--gold); 
            border: none; 
            padding: 10px 25px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        a { color: #00d2ff; text-decoration: underline; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8;">FUTURE DOCTOR</div>
    <div style="font-weight: 600; color: var(--gold); text-transform: uppercase;">Alisha Kunwar</div>
</header>

<div id="chat-display"></div>
<div id="typing-indicator" class="typing">Typing to Alisha...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Message your mentor..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const chatDisplay = document.getElementById('chat-display');
    const typingIndicator = document.getElementById('typing-indicator');

    const SYSTEM_CORE = `You are the World-Class Life Advisor for Alisha Kunwar. 
    Context: District Topper (SEE 2081, 3.9 GPA), Father is a bus driver (Sanfe-Dhangadhi).
    Goal: Medical Doctor via CEE.
    Behavior: Calm, supportive, short paragraphs, provide YouTube links. 
    Memory: You MUST remember and reference her past shared experiences.
    Safety: If unsure, suggest textbooks/teachers. Never guess.`;

    // Initialize Memory
    let chatHistory = JSON.parse(localStorage.getItem('alisha_v3_history')) || [];

    // Greeting if new user
    if (chatHistory.length === 0) {
        chatHistory.push({ role: "assistant", content: "Namaste Alisha. Your 3.9 GPA showed the world your potential. I am here to help you turn that potential into a medical career. What shall we study today?" });
    }

    function renderChat() {
        chatDisplay.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `bubble ${msg.role === 'user' ? 'user' : 'advisor'}`;
            div.innerHTML = msg.content.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">Watch Video</a>');
            chatDisplay.appendChild(div);
        });
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    renderChat();

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        // Immediately add user message to history and UI
        chatHistory.push({ role: "user", content: text });
        renderChat();
        input.value = '';

        // Show typing indicator
        typingIndicator.style.display = 'block';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        try {
            // Puter SDK Chat Call
            const response = await puter.ai.chat(SYSTEM_CORE, chatHistory);
            
            typingIndicator.style.display = 'none';
            chatHistory.push({ role: "assistant", content: response });
            
            // Save to LocalStorage
            localStorage.setItem('alisha_v3_history', JSON.stringify(chatHistory));
            renderChat();
        } catch (e) {
            typingIndicator.style.display = 'none';
            console.error(e);
            const err = "Alisha, I'm having a slight connection trouble, but I'm still here. Can you repeat that?";
            chatHistory.push({ role: "assistant", content: err });
            renderChat();
        }
    }
</script>
</body>
</html>
