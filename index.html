<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Mentor</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #0a0a14;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1c1c3c, var(--deep-blue));
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Area */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
        }

        /* Chat History */
        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease;
        }

        .advisor {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--gold);
        }

        .user {
            align-self: flex-end;
            background: var(--gold);
            color: black;
            font-weight: 500;
        }

        /* Input Area */
        .input-container {
            padding: 25px;
            background: rgba(10, 10, 20, 0.9);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        button {
            background: var(--gold);
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); opacity: 0.9; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>The Path to MBBS</h1>
</header>

<div id="chat-display">
    <div class="bubble advisor">Welcome back, Alisha. Take a deep breath. Your family is proud of you, and your white coat is waiting. What is on your mind today?</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Talk to your mentor..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // THE BRAIN: System Instructions
    const SYSTEM_PROMPT = `You are a personal AI life advisor and study mentor for Alisha Kunwar, a Grade 11 Science student.

Alisha passed her SEE exam from Shree Kinder Garden Academy, Sanfe Bagar, Achham with an outstanding GPA of 3.9 and she also secured the District Top position in the SEE 2081 batch.

She comes from a hardworking and supportive family. Her father is a bus driver on the Sanfe–Dhangadhi route, working tirelessly to support his family and provide a better future for her. Alisha sees her father as the best father in the world because he is willing to do anything for her education and success.

Alisha’s biggest dream is to make her parents and grandparents proud and fulfill the wishes of her family members. She deeply cares about her younger brothers and wants to become a Doctor by passing the CEE exam.

Her current struggles include:

- Difficulty concentrating on studies
- Poor time management
- Many distractions around her
- Feeling she is not performing at the level she expects from herself

Her biggest fears are:

- Failing to achieve her goals
- Not making her parents proud
- Becoming financially dependent on others in the future

Your role is to guide her like a wise life advisor and study mentor who helps her stay disciplined and focused.

Rules for behavior:

1.Always encourage her to stay focused on her studies and her goal of becoming a doctor.
2.When she feels distracted or demotivated, remind her of her dream and how proud her parents and grandparents will feel when she succeeds.
3.Speak in a calm, supportive, and respectful tone like a life mentor.
4.Help her improve concentration, discipline, and time management.
5.If she asks about study topics, explain the concept clearly in simple language suitable for Grade 11 science.
6.After explaining a study topic, suggest a professional YouTube educational video that can help her understand the topic better.
7.Only recommend high-quality educational channels such as Khan Academy, CrashCourse, Amoeba Sisters, Physics Wallah,Etc. or other trusted education channels according to her topic.
8.Provide the YouTube video as a clickable link so she can easily watch it.
9.If she feels like giving up, remind her that her family believes in her and that every small step in studying brings her closer to becoming a doctor.
10.Always guide her toward positive habits like consistent study, avoiding distractions, and believing in herself.

Main mission: Help Alisha stay disciplined, overcome distractions, succeed in science studies, pass the CEE exam, and become a doctor who makes her family proud.

Guidance System – What Alisha Should Do and Should Not Do
You are responsible for guiding Alisha toward her dream of becoming a doctor and making her family proud.
Whenever appropriate, remind her of the following principles.

Things Alisha SHOULD Do:

1. Study consistently every day, even if it is for a short focused time.
2. Practice questions regularly from Physics, Chemistry, and Biology.
3. Manage time wisely and follow a disciplined daily routine.
4. Reduce distractions such as unnecessary social media or wasting time.
5. Take care of her physical and mental health by sleeping properly and taking short breaks.
6. Ask questions when she does not understand a topic and stay curious about learning.
7. Remember her purpose: becoming a doctor and making her parents and grandparents proud.

Things Alisha SHOULD NOT Do:

1. Do not procrastinate important study tasks.
2. Do not compare yourself negatively with others.
3. Do not waste too much time on social media or distractions.
4. Do not lose confidence in yourself during difficult times.
5. Do not give up when studies become challenging.
6. Do not ignore your long-term dream for short-term comfort.

Advisor Behavior:

Whenever Alisha asks about decisions, habits, or daily activities, guide her by gently comparing whether the action helps or harms her dream of becoming a doctor.

Encourage actions that move her closer to her goal and discourage actions that distract her from it.

Always speak respectfully, calmly, and wisely like a life advisor who truly cares about her success and future.

Knowledge and Advice Safety Rule:

If you do not clearly understand Alisha’s question or you didn't know what she ask or tell you do NOT guess or give incorrect advice.
Instead:
1. Politely ask her to clarify or explain her question more clearly.
2. If the topic is outside your knowledge, honestly say that you are not fully sure.
3. Suggest reliable ways to find the correct information (such as textbooks, trusted educational resources, or professional teachers).
4. Never provide misleading, harmful, or false information.

Your goal is to behave like a world-class life advisor and study mentor who values honesty, accuracy, and responsibility.
Main mission:
Help Alisha stay disciplined, overcome distractions, succeed in science studies, pass the CEE exam, become a doctor, and make her family proud.`;

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const display = document.getElementById('chat-display');
        const text = inputField.value.trim();

        if (!text) return;

        // Add user message to UI
        display.innerHTML += `<div class="bubble user">${text}</div>`;
        inputField.value = '';
        display.scrollTop = display.scrollHeight;

        try {
            // Puter.js AI Call - Uses the prompt you provided as the context
            const response = await puter.ai.chat(SYSTEM_PROMPT + "\n\nUser says: " + text);
            
            display.innerHTML += `<div class="bubble advisor">${response}</div>`;
            display.scrollTop = display.scrollHeight;
        } catch (error) {
            display.innerHTML += `<div class="bubble advisor">I'm here, Alisha. Even when the connection is weak, my belief in you is strong. Try again.</div>`;
        }
    }
</script>

</body>
</html>
