<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Alisha's Mentor</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a14; --glass: rgba(255, 255, 255, 0.05); }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: radial-gradient(circle at top right, #1c1c3c, var(--bg)); 
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        header { 
            padding: 15px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            backdrop-filter: blur(10px); flex-shrink: 0;
        }

        #chat-display { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
        }

        .bubble { 
            max-width: 85%; padding: 12px 18px; border-radius: 15px; 
            line-height: 1.6; font-size: 0.95rem; word-wrap: break-word;
        }

        .advisor { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--gold); }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: 500; }

        .typing { font-size: 0.8rem; color: var(--gold); padding: 5px 20px; display: none; font-style: italic; }

        /* FIXED POSITION: Moves box up and keeps it visible on mobile */
        .input-area { 
            padding: 15px 15px 30px 15px; 
            background: rgba(10, 10, 20, 0.98); 
            display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.4); 
            padding: 12px 15px; border-radius: 25px; color: white; outline: none; font-size: 16px; /* 16px prevents iOS zoom */
        }

        button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        a { color: #00d2ff; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8;">FUTURE DOCTOR</div>
    <div style="font-weight: 600; color: var(--gold); text-transform: uppercase;">Alisha Kunwar</div>
</header>

<div id="chat-display"></div>
<div id="typing-indicator" class="typing">Typing to Alisha...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Talk to your mentor..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const chatDisplay = document.getElementById('chat-display');
    const typingIndicator = document.getElementById('typing-indicator');

    // Paste the "Brain" information here
    const SYSTEM_CORE = `You are the Personal Life Advisor for Alisha Kunwar. Goal: CEE Doctor. District Topper 3.9 GPA. Keep paragraphs short and wise. If unsure, suggest textbooks.`;

    // Load History
    let chatHistory = JSON.parse(localStorage.getItem('alisha_v5_final')) || [
        { role: "assistant", content: "Namaste Alisha. Your medical journey is my priority. How can I help you today?" }
    ];

    function renderChat() {
        chatDisplay.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `bubble ${msg.role === 'user' ? 'user' : 'advisor'}`;
            // Sanitizes and converts links
            const cleanContent = msg.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            div.innerHTML = cleanContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">Watch Video</a>');
            chatDisplay.appendChild(div);
        });
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Initialize display
    renderChat();

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        // STEP 1: ADD USER MESSAGE TO SCREEN IMMEDIATELY
        chatHistory.push({ role: "user", content: text });
        renderChat();
        input.value = '';

        // STEP 2: SHOW TYPING
        typingIndicator.style.display = 'block';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        try {
            // STEP 3: SILENT AI CALL
            // We only send the system core and the last few messages to stay within free limits
            const context = SYSTEM_CORE + "\nRecent Conversation:\n" + 
                            chatHistory.slice(-4).map(m => `${m.role}: ${m.content}`).join("\n");

            const response = await puter.ai.chat(context);
            
            typingIndicator.style.display = 'none';
            
            // Check if response is valid
            if(response) {
                chatHistory.push({ role: "assistant", content: response });
                localStorage.setItem('alisha_v5_final', JSON.stringify(chatHistory));
                renderChat();
            } else {
                throw new Error("Empty response");
            }

        } catch (e) {
            typingIndicator.style.display = 'none';
            console.error("AI Error:", e);
            // Fallback so the screen isn't empty
            const fallback = "Alisha, my connection is a bit weak, but my support for you is strong. Please try saying that again.";
            chatHistory.push({ role: "assistant", content: fallback });
            renderChat();
        }
    }
</script>
</body>
</html>
