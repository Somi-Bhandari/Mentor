<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alisha's Assistant</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a14; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: radial-gradient(circle at top right, #1c1c3c, var(--bg)); 
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Stylish Header */
        header { 
            display: flex; justify-content: flex-end; padding: 20px; 
            background: linear-gradient(to left, rgba(212, 175, 55, 0.1), transparent);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); flex-shrink: 0;
        }
        header h1 { 
            font-family: 'Playfair Display', serif; font-size: 0.85rem; 
            color: var(--gold); letter-spacing: 2px; margin: 0; font-style: italic;
        }

        /* Fixed Scrolling Area - This is the fix for your scrolling issue */
        #chat-display { 
            flex: 1; overflow-y: scroll; padding: 20px; 
            display: flex; flex-direction: column; gap: 18px;
            scroll-behavior: smooth; height: 100%;
        }

        /* Custom Scrollbar for a premium look */
        #chat-display::-webkit-scrollbar { width: 4px; }
        #chat-display::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .bubble { 
            max-width: 85%; padding: 14px 18px; border-radius: 20px; 
            line-height: 1.6; font-size: 0.95rem; word-wrap: break-word;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .advisor { align-self: flex-start; background: var(--glass); border-left: 2px solid var(--gold); border-bottom-left-radius: 4px; border-top-left-radius: 15px; }
        .user { align-self: flex-end; background: var(--gold); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }

        .typing { font-size: 0.8rem; color: var(--gold); padding: 8px 25px; display: none; font-style: italic; letter-spacing: 1px; }

        /* Stylish Fixed Input */
        .input-area { 
            padding: 15px 15px 35px 15px; background: #0f0f1b; 
            display: flex; gap: 12px; border-top: 1px solid rgba(212, 175, 55, 0.1);
            flex-shrink: 0;
        }
        input { 
            flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 14px 20px; border-radius: 30px; color: white; outline: none; font-size: 16px;
        }
        button { background: var(--gold); border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; color: #000; transition: 0.3s; }
        button:active { transform: scale(0.95); }

        a { color: #00d2ff; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h1>ALISHA'S PERSONAL ASSISTANT</h1>
</header>

<div id="chat-display"></div>
<div id="typing-indicator" class="typing">Mentoring Alisha...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask your mentor..." autocomplete="off">
    <button id="sendBtn">Send</button>
</div>

<script>
    const chatDisplay = document.getElementById('chat-display');
    const typingIndicator = document.getElementById('typing-indicator');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // CONTEXT BRAIN
    const SYSTEM_PROMPT = `You are Alisha Kunwar's Life Advisor. District Topper 3.9 GPA. Father: Bus Driver. Goal: CEE Doctor. 
    Remind her of her potential. Keep answers under 3 short paragraphs. Use YouTube links as <a> tags.`;

    // VERSIONED MEMORY to clear out previous errors
    let chatHistory = JSON.parse(localStorage.getItem('alisha_pro_v1')) || [
        { role: "assistant", content: "Namaste, Alisha. Your medical dream is our focus. How are you feeling about your studies today?" }
    ];

    function renderChat() {
        chatDisplay.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `bubble ${msg.role === 'user' ? 'user' : 'advisor'}`;
            div.innerHTML = msg.content.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">Watch Video</a>');
            chatDisplay.appendChild(div);
        });
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        chatHistory.push({ role: "user", content: text });
        userInput.value = '';
        renderChat();

        typingIndicator.style.display = 'block';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        try {
            // RELIABLE AI CALL: Using the context + chat logic
            const response = await puter.ai.chat(SYSTEM_PROMPT, chatHistory.slice(-8));
            
            typingIndicator.style.display = 'none';
            if(response && response.trim() !== "") {
                chatHistory.push({ role: "assistant", content: response });
                localStorage.setItem('alisha_pro_v1', JSON.stringify(chatHistory));
                renderChat();
            } else {
                throw new Error("Empty response");
            }
        } catch (error) {
            typingIndicator.style.display = 'none';
            console.error("AI Error:", error);
            // Dynamic recovery message
            const recoveryMsg = "Alisha, even when I'm quiet, I'm with you. Let's try that question one more time—your dream is worth the effort.";
            chatHistory.push({ role: "assistant", content: recoveryMsg });
            renderChat();
        }
    }

    sendBtn.onclick = handleSend;
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });

    renderChat();
</script>
</body>
</html>
