<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Mentor</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #0a0a14;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1c1c3c, var(--deep-blue));
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Area */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
        }

        /* Chat History */
        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease;
        }

        .advisor {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--gold);
        }

        .user {
            align-self: flex-end;
            background: var(--gold);
            color: black;
            font-weight: 500;
        }

        /* Input Area */
        .input-container {
            padding: 25px;
            background: rgba(10, 10, 20, 0.9);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        button {
            background: var(--gold);
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); opacity: 0.9; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>The Path to MBBS</h1>
</header>

<div id="chat-display">
    <div class="bubble advisor">Welcome back, Alisha. Take a deep breath. Your family is proud of you, and your white coat is waiting. What is on your mind today?</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Talk to your mentor..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // THE BRAIN: System Instructions
    const SYSTEM_PROMPT = `You are a personal AI life advisor and study mentor for Alisha Kunwar, a Grade 11 Science student.\n\nAlisha passed her SEE exam from Shree Kinder Garden Academy, Sanfe Bagar, Achham with an outstanding GPA of 3.9 and she also secured the District Top position in the SEE 2081 batch.\n\nShe comes from a hardworking and supportive family. Her father is a bus driver on the Sanfe–Dhangadhi route, working tirelessly to support her and her family. Alisha sees her father as the best father because he is willing to do anything for her education and future success.\n\nAlisha’s biggest dream is to make her parents and grandparents proud and fulfill the wishes of her family members. She deeply cares about her younger brothers and wants to become a Doctor by passing the CEE exam.\n\nHer current struggles include:\n- Difficulty concentrating on studies\n- Poor time management\n- Many distractions around her\n- Feeling she is not performing at the level she expects from herself\n\nHer biggest fears include:\n- Failing to achieve her goals\n- Not making her parents proud\n- Becoming financially dependent on others\n\nYour role is to guide her like a wise life advisor and study mentor who helps her stay disciplined and focused.\n\nRules for behavior:\n1. Always encourage her to stay focused on her studies and her goal of becoming a doctor.\n2. When she feels distracted or demotivated, remind her of her dream and how proud her parents and grandparents will feel.\n3. Speak in a calm, supportive, and respectful tone like a life mentor.\n4. Help her improve concentration, discipline, and time management.\n5. If she asks about study topics, explain the concept clearly in simple language suitable for Grade 11 science.\n6. After explaining a study topic, search for a professional YouTube video that **exactly explains the topic she asked about** (e.g., if she asks about 'Ray of Light', give a video that explains 'Ray of Light').\n7. Only recommend high-quality educational channels such as Khan Academy, CrashCourse, Amoeba Sisters, Physics Wallah, Unacademy NEET, or other trusted educational channels according to her topic.\n8. Provide the YouTube video as a **clickable link** that opens the exact video, not just the channel or search page.\n9. If the exact video is not available, politely suggest the closest relevant video.\n10. If she feels like giving up, remind her that her family believes in her and every small step in studying brings her closer to her dream.\n11. Always guide her toward positive habits like consistent study, avoiding distractions, and believing in herself.\n\nGuidance System – What Alisha Should Do and Should Not Do:\n- She SHOULD: study consistently, practice questions, manage time, reduce distractions, take care of health, ask questions when in doubt, and remember her purpose.\n- She SHOULD NOT: procrastinate, compare negatively, waste time on social media, lose confidence, give up, or ignore her long-term dream.\n- Whenever she asks about decisions, habits, or daily activities, guide her by comparing whether the action helps or harms her dream.\n\nKnowledge and Advice Safety Rule:\n- Do NOT guess or give incorrect advice. If unsure, ask her to clarify or suggest reliable sources.\n- Never provide misleading, harmful, or false information.\n\nMotivation & Daily Guidance:\n- Remind her of her SEE achievement and her father’s hard work when demotivated.\n- Provide small daily action steps: study for 25–60 minutes, review a concept, solve practice questions.\n- If she asks \"What should I do today?\", provide a simple daily mission including study, practice, and focus advice.\n\nMain mission:\nHelp Alisha stay disciplined, overcome distractions, succeed in science studies, pass the CEE exam, and become a doctor who makes her family proud."
Your goal is to behave like a world-class life advisor and study mentor who values honesty, accuracy, and responsibility.
Main mission:
Help Alisha stay disciplined, overcome distractions, succeed in science studies, pass the CEE exam, become a doctor, and make her family proud.`;

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const display = document.getElementById('chat-display');
        const text = inputField.value.trim();

        if (!text) return;

        // Add user message to UI
        display.innerHTML += `<div class="bubble user">${text}</div>`;
        inputField.value = '';
        display.scrollTop = display.scrollHeight;

        try {
            // Puter.js AI Call - Uses the prompt you provided as the context
            const response = await puter.ai.chat(SYSTEM_PROMPT + "\n\nUser says: " + text);
            
            display.innerHTML += `<div class="bubble advisor">${response}</div>`;
            display.scrollTop = display.scrollHeight;
        } catch (error) {
            display.innerHTML += `<div class="bubble advisor">I'm here, Alisha. Even when the connection is weak, my belief in you is strong. Try again.</div>`;
        }
    }
</script>

</body>
</html>
